<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Rockz</title>
<script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--panel:#161b22;--card:#1e2530;
  --accent:#4ade80;--accent2:#22d3ee;--accent3:#a78bfa;
  --muted:#8b949e;--border:rgba(255,255,255,0.07);
  --text:#e6edf3;--red:#f85149;
  --bme:#1a3a2a;--bthem:#1e2530;
  font-family:'Segoe UI',system-ui,sans-serif
}
body{background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center}

/* AUTH */
#auth{width:100%;max-width:400px;padding:20px}
.logo{text-align:center;margin-bottom:28px}
.logo-mark{width:56px;height:56px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;color:#000;margin:0 auto 10px}
.logo h1{font-size:24px;font-weight:700}
.logo p{color:var(--muted);font-size:13px;margin-top:3px}
.auth-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:24px}
.tabs{display:flex;background:var(--card);border-radius:9px;padding:3px;margin-bottom:20px}
.tab{flex:1;padding:7px;font-size:13px;font-weight:500;border:none;background:none;color:var(--muted);cursor:pointer;border-radius:7px;transition:.15s}
.tab.on{background:var(--panel);color:var(--text)}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:500}
.fg input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:9px;padding:10px 13px;color:var(--text);font-size:13px;outline:none;transition:.15s;font-family:inherit}
.fg input:focus{border-color:rgba(74,222,128,.4)}
.fg input::placeholder{color:var(--muted)}
.abtn{width:100%;padding:11px;background:var(--accent);color:#000;border:none;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;transition:.15s;margin-top:2px}
.abtn:hover{background:#6ee7a0}
.abtn:active{transform:scale(.98)}
.aerr{background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.3);color:var(--red);border-radius:7px;padding:9px 13px;font-size:12px;margin-bottom:12px;display:none}

/* APP */
#app{display:none;width:100%;height:100vh;flex-direction:column}
#app.on{display:flex}
.wrap{display:flex;height:100%;position:relative}

/* Sidebar */
.sb{width:62px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:12px 0;gap:5px;flex-shrink:0}
.sb-logo{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#000;margin-bottom:8px}
.nbtn{width:40px;height:40px;border-radius:11px;border:none;background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;transition:.15s}
.nbtn:hover{background:var(--card);color:var(--text)}
.nbtn.on{background:rgba(74,222,128,.12);color:var(--accent)}
.spacer{flex:1}
.myav{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;cursor:pointer}
.lout{background:none;border:none;color:var(--muted);cursor:pointer;font-size:10px;padding:5px 8px;border-radius:7px;transition:.15s;margin-top:2px}
.lout:hover{background:var(--card);color:var(--red)}

/* Panel */
.pnl{width:250px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.ph{padding:16px 13px 9px;display:flex;align-items:center;justify-content:space-between}
.pt{font-size:16px;font-weight:600}
.sw{margin:0 9px 9px;background:var(--card);border:1px solid var(--border);border-radius:9px;display:flex;align-items:center;gap:7px;padding:6px 10px}
.sw input{background:none;border:none;outline:none;color:var(--text);font-size:12px;width:100%;font-family:inherit}
.sw input::placeholder{color:var(--muted)}
.cl{flex:1;overflow-y:auto;padding:0 5px 6px}
.cl::-webkit-scrollbar{width:2px}
.cl::-webkit-scrollbar-thumb{background:var(--border)}
.slbl{font-size:10px;font-weight:700;letter-spacing:.8px;color:var(--muted);padding:7px 8px 3px;text-transform:uppercase}
.ci{display:flex;align-items:center;gap:8px;padding:8px 7px;border-radius:9px;cursor:pointer;transition:.1s}
.ci:hover{background:var(--card)}
.ci.on{background:rgba(74,222,128,.08)}
.av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;position:relative}
.od{position:absolute;bottom:0;right:0;width:8px;height:8px;border-radius:50%;background:var(--accent);border:2px solid var(--panel)}
.ci-info{flex:1;min-width:0}
.cn{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cp{font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}

/* Main */
.main{flex:1;display:flex;flex-direction:column;min-width:0}

/* No chat */
#nc{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--muted);text-align:center;padding:20px}
#nc .bi{font-size:52px;opacity:.35}
#nc h2{font-size:18px;font-weight:600;color:var(--text)}
#nc p{font-size:13px;max-width:200px;line-height:1.6}

/* Chat */
#cv{display:flex;flex-direction:column;flex:1;min-height:0}
.chdr{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--panel);flex-shrink:0}
.hname{font-size:14px;font-weight:600}
.hstat{font-size:10px}
.on-s{color:var(--accent)}
.off-s{color:var(--muted)}
.hact{margin-left:auto;display:flex;gap:4px}
.abtn2{width:32px;height:32px;border-radius:8px;border:none;background:var(--card);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:.15s}
.abtn2:hover{color:var(--text)}
.abtn2.c:hover{color:var(--accent);background:rgba(74,222,128,.1)}
.abtn2.v:hover{color:var(--accent2);background:rgba(34,211,238,.1)}
.msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:2px}
.msgs::-webkit-scrollbar{width:2px}
.msgs::-webkit-scrollbar-thumb{background:var(--border)}
.ddiv{text-align:center;font-size:10px;color:var(--muted);margin:8px 0;display:flex;align-items:center;gap:7px}
.ddiv::before,.ddiv::after{content:'';flex:1;height:1px;background:var(--border)}
.mr{display:flex;align-items:flex-end;gap:6px;margin:2px 0}
.mr.me{flex-direction:row-reverse}
.mav{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;flex-shrink:0}
.bub{max-width:68%;padding:8px 12px;border-radius:15px;font-size:13px;line-height:1.5}
.bub.t{background:var(--bthem);border-bottom-left-radius:3px}
.bub.m{background:var(--bme);border-bottom-right-radius:3px;color:#d4f5e4}
.bt{font-size:10px;color:var(--muted);margin-top:3px;display:block;text-align:right}
.bub.m .bt{color:rgba(74,222,128,.4)}
.sys{text-align:center;font-size:11px;color:var(--muted);margin:5px 0;align-self:center;background:var(--card);padding:3px 11px;border-radius:18px}
.typdots{display:flex;align-items:center;gap:3px;padding:10px 13px}
.dot{width:5px;height:5px;border-radius:50%;background:var(--muted);animation:bonce 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes bonce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.ia{padding:10px 13px;border-top:1px solid var(--border);background:var(--panel);flex-shrink:0}
.ir{display:flex;align-items:flex-end;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:6px 10px;transition:.15s}
.ir:focus-within{border-color:rgba(74,222,128,.3)}
.tbtn{width:25px;height:25px;border:none;background:none;color:var(--muted);cursor:pointer;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:13px}
.tbtn:hover{color:var(--text)}
.mi{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:13px;resize:none;font-family:inherit;max-height:100px;min-height:20px;line-height:1.5}
.mi::placeholder{color:var(--muted)}
.sbtn{width:29px;height:29px;border-radius:7px;border:none;background:var(--accent);color:#000;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:.15s;flex-shrink:0}
.sbtn:hover{background:#6ee7a0;transform:scale(1.05)}
.sbtn:active{transform:scale(.95)}

/* Calls view */
#callv{flex:1;display:flex;flex-direction:column}
.clog{flex:1;overflow-y:auto;padding:10px 13px}

/* Call overlay */
.cover{position:absolute;inset:0;background:rgba(10,14,20,.97);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;gap:16px;animation:fi .25s ease}
@keyframes fi{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
.cav{width:90px;height:90px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#000;position:relative;margin-bottom:4px}
.cring{position:absolute;inset:-11px;border-radius:50%;border:2px solid rgba(74,222,128,.3);animation:rng 1.6s ease infinite}
.cring:nth-child(2){inset:-22px;animation-delay:.5s;border-color:rgba(74,222,128,.15)}
@keyframes rng{0%{transform:scale(.95);opacity:1}100%{transform:scale(1.07);opacity:0}}
.cnbig{font-size:20px;font-weight:700}
.cstat{font-size:13px;color:var(--muted)}
.ctim{font-family:'Courier New',monospace;font-size:16px;color:var(--accent);letter-spacing:2px}
.cctrl{display:flex;gap:12px;margin-top:12px}
.cc{width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:19px;transition:.15s}
.cc:hover{transform:scale(1.08)}
.cc.end{background:var(--red);color:#fff}
.cc.mute,.cc.spk,.cc.vid{background:var(--card);color:var(--text)}
.cc.mute.mu{background:rgba(248,81,73,.15);color:var(--red)}

/* Incoming */
.icover{position:absolute;inset:0;background:rgba(10,14,20,.97);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:300;gap:14px;animation:fi .25s ease}
.ititle{font-size:13px;color:var(--muted)}
.iname{font-size:22px;font-weight:700}
.iact{display:flex;gap:28px;margin-top:8px}
.ibtn{width:58px;height:58px;border-radius:50%;border:none;cursor:pointer;font-size:22px;display:flex;align-items:center;justify-content:center;transition:.15s}
.ibtn:hover{transform:scale(1.1)}
.iacc{background:var(--accent);color:#000}
.irej{background:var(--red);color:#fff}

video{border-radius:10px;background:#000}
#rv{display:none;width:100%;max-width:460px;max-height:320px;margin-bottom:6px}
#lv{display:none;position:absolute;bottom:155px;right:20px;width:110px;height:82px;border:2px solid var(--border)}

.hidden{display:none!important}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth">
  <div class="logo">
    <div class="logo-mark">R</div>
    <h1>Rockz</h1>
    <p>Real-time messaging & calls</p>
  </div>
  <div class="auth-card">
    <div class="tabs">
      <button class="tab on" onclick="showTab('login')">Sign In</button>
      <button class="tab" onclick="showTab('register')">Register</button>
    </div>
    <div id="aerr" class="aerr"></div>
    <div id="lf">
      <div class="fg"><label>Username</label><input id="lu" type="text" placeholder="Your username" autocomplete="username"/></div>
      <div class="fg"><label>Password</label><input id="lp" type="password" placeholder="Your password" autocomplete="current-password"/></div>
      <button class="abtn" onclick="doLogin()">Sign In →</button>
    </div>
    <div id="rf" class="hidden">
      <div class="fg"><label>Username</label><input id="ru" type="text" placeholder="Min 3 chars, letters/numbers/_" autocomplete="username"/></div>
      <div class="fg"><label>Password</label><input id="rp" type="password" placeholder="Min 6 characters" autocomplete="new-password"/></div>
      <div class="fg"><label>Confirm Password</label><input id="rp2" type="password" placeholder="Repeat password" autocomplete="new-password"/></div>
      <button class="abtn" onclick="doRegister()">Create Account →</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
 <div class="wrap">

  <!-- Sidebar -->
  <div class="sb">
    <div class="sb-logo">R</div>
    <button class="nbtn on" id="nb-chat" onclick="setView('chat')" title="Chats">💬</button>
    <button class="nbtn" id="nb-calls" onclick="setView('calls')" title="Calls">📞</button>
    <div class="spacer"></div>
    <div class="myav" id="myav"></div>
    <button class="lout" onclick="logout()" title="Sign out">⏏</button>
  </div>

  <!-- Panel -->
  <div class="pnl">
    <div class="ph"><span class="pt" id="ptitle">Chats</span></div>
    <div class="sw">
      <span style="color:var(--muted);font-size:12px">🔍</span>
      <input type="text" placeholder="Search users..." id="srch" oninput="filterUsers()"/>
    </div>
    <div class="cl" id="ulist"><div class="slbl">Users</div><div style="padding:14px;color:var(--muted);font-size:12px">Loading...</div></div>
  </div>

  <!-- Main -->
  <div class="main">

    <div id="nc">
      <div class="bi">💬</div>
      <h2>Pick someone to chat with</h2>
      <p>Select a user from the list to start a conversation or make a call.</p>
    </div>

    <div id="cv" class="hidden">
      <div class="chdr">
        <div class="av" id="hav"></div>
        <div>
          <div class="hname" id="hn"></div>
          <div class="hstat off-s" id="hs">Offline</div>
        </div>
        <div class="hact">
          <button class="abtn2 c" onclick="startCall('audio')" title="Voice call">📞</button>
          <button class="abtn2 v" onclick="startCall('video')" title="Video call">📹</button>
        </div>
      </div>
      <div class="msgs" id="ml"></div>
      <div class="ia">
        <div class="ir">
          <button class="tbtn">😊</button>
          <textarea class="mi" id="mi" placeholder="Message..." rows="1"
            onkeydown="onKey(event)" oninput="onTyping();resize(this)"></textarea>
          <button class="sbtn" onclick="send()">➤</button>
        </div>
      </div>
    </div>

    <div id="callv" class="hidden">
      <div class="chdr">
        <span style="font-size:17px">📞</span>
        <div><div class="hname">Calls</div><div class="hstat off-s">Tap a user to call</div></div>
      </div>
      <div class="clog"><div class="slbl">Recent</div><div id="cloglist" style="color:var(--muted);font-size:12px;padding:12px">No calls yet.</div></div>
    </div>

  </div>

  <!-- Incoming call -->
  <div class="icover hidden" id="ico">
    <div class="cav" id="iav">
      <div class="cring"></div><div class="cring"></div>
      <span id="iin" style="position:relative;z-index:1"></span>
    </div>
    <div class="ititle" id="ityp">Incoming call</div>
    <div class="iname" id="iname"></div>
    <div class="iact">
      <button class="ibtn iacc" onclick="acceptCall()">📞</button>
      <button class="ibtn irej" onclick="rejectCall()">📵</button>
    </div>
  </div>

  <!-- Active call -->
  <div class="cover hidden" id="cao">
    <div class="cav" id="cav">
      <div class="cring"></div><div class="cring"></div>
      <span id="cin" style="position:relative;z-index:1"></span>
    </div>
    <video id="rv" autoplay playsinline></video>
    <div class="cnbig" id="cdn"></div>
    <div class="cstat" id="cst">Calling...</div>
    <div class="ctim hidden" id="ctim">00:00</div>
    <div class="cctrl">
      <button class="cc mute" id="mbtn" onclick="toggleMute()">🎤</button>
      <button class="cc spk">🔊</button>
      <button class="cc vid" id="vbtn" onclick="toggleVid()">📹</button>
      <button class="cc end" onclick="endCall()">📵</button>
    </div>
    <video id="lv" autoplay playsinline muted></video>
  </div>

 </div>
</div>

<script>
// ── helpers ──────────────────────────────────────────────
const COLS=['linear-gradient(135deg,#4ade80,#22d3ee)','linear-gradient(135deg,#a78bfa,#ec4899)','linear-gradient(135deg,#f59e0b,#ef4444)','linear-gradient(135deg,#3b82f6,#6366f1)','linear-gradient(135deg,#10b981,#06b6d4)','linear-gradient(135deg,#f97316,#e11d48)'];
const col=n=>COLS[n.charCodeAt(0)%COLS.length];
const ini=n=>n.slice(0,2).toUpperCase();
const ts=s=>{const d=new Date(s),h=d.getHours(),m=String(d.getMinutes()).padStart(2,'0');return(h%12||12)+':'+m+' '+(h<12?'AM':'PM')};
const esc=t=>t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const $=id=>document.getElementById(id);

// ── state ────────────────────────────────────────────────
let token=localStorage.getItem('rt'),me=localStorage.getItem('ru');
let socket=null,active=null,online=[],users=[],callLog=[];
let pc=null,ls=null,callSec=0,callTick=null,muted=false,incData=null;
let typTmr=null,typEl=null;

// ── auth ─────────────────────────────────────────────────
function showTab(t){
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('on',['login','register'][i]===t));
  $('lf').classList.toggle('hidden',t!=='login');
  $('rf').classList.toggle('hidden',t!=='register');
  $('aerr').style.display='none';
}
function err(m){const e=$('aerr');e.textContent=m;e.style.display='block'}

async function doLogin(){
  const u=$('lu').value.trim(),p=$('lp').value;
  if(!u||!p)return err('Fill in all fields.');
  try{
    const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
    const d=await r.json();
    if(!r.ok)return err(d.error||'Login failed.');
    save(d.token,d.username);boot();
  }catch{err('Cannot reach server.');}
}
async function doRegister(){
  const u=$('ru').value.trim(),p=$('rp').value,p2=$('rp2').value;
  if(!u||!p||!p2)return err('Fill in all fields.');
  if(p!==p2)return err('Passwords do not match.');
  try{
    const r=await fetch('/api/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
    const d=await r.json();
    if(!r.ok)return err(d.error||'Registration failed.');
    save(d.token,d.username);boot();
  }catch{err('Cannot reach server.');}
}
function save(t,u){token=t;me=u;localStorage.setItem('rt',t);localStorage.setItem('ru',u)}
function logout(){if(socket)socket.disconnect();localStorage.removeItem('rt');localStorage.removeItem('ru');token=null;me=null;$('app').classList.remove('on');$('auth').style.display='block'}

// ── boot ─────────────────────────────────────────────────
function boot(){
  $('auth').style.display='none';$('app').classList.add('on');
  const av=$('myav');av.textContent=ini(me);av.style.background=col(me);av.title=me;
  connectSocket();loadUsers();
}

// ── socket ───────────────────────────────────────────────
function connectSocket(){
  socket=io({auth:{token}});
  socket.on('online_users',u=>{online=u;renderUsers();if(active)updateHdr()});
  socket.on('receive_message',msg=>{
    const mine=(msg.from_user===active&&msg.to_user===me)||(msg.from_user===me&&msg.to_user===active);
    if(mine)appendMsg(msg);
  });
  socket.on('user_typing',({from,isTyping})=>{if(from===active)showTyping(isTyping)});
  socket.on('incoming_call',({from,offer,callType})=>{incData={from,offer,callType};showIncoming(from,callType)});
  socket.on('call_answered',({answer})=>{if(pc)pc.setRemoteDescription(answer)});
  socket.on('call_rejected',()=>{setCst('Call declined');setTimeout(cleanup,1500)});
  socket.on('call_failed',({reason})=>{setCst(reason);setTimeout(cleanup,2000)});
  socket.on('ice_candidate',({candidate})=>{if(pc&&candidate)pc.addIceCandidate(new RTCIceCandidate(candidate))});
  socket.on('call_ended',()=>{setCst('Call ended');setTimeout(cleanup,1000)});
}

// ── users ─────────────────────────────────────────────────
async function loadUsers(){
  try{const r=await fetch('/api/users',{headers:{Authorization:'Bearer '+token}});users=(await r.json()).filter(u=>u!==me);renderUsers();}catch{}
}
function filterUsers(){renderUsers($('srch').value.toLowerCase())}
function renderUsers(q=''){
  const list=$('ulist');
  const f=users.filter(u=>u.toLowerCase().includes(q));
  if(!f.length){list.innerHTML='<div class="slbl">Users</div><div style="padding:14px;color:var(--muted);font-size:12px">No users found.</div>';return}
  list.innerHTML='<div class="slbl">Users</div>'+f.map(u=>`
    <div class="ci${u===active?' on':''}" onclick="openChat('${u}')">
      <div class="av" style="background:${col(u)}">${ini(u)}${online.includes(u)?'<div class="od"></div>':''}</div>
      <div class="ci-info">
        <div class="cn">${u}</div>
        <div class="cp">${online.includes(u)?'● Online':'○ Offline'}</div>
      </div>
    </div>`).join('');
}

// ── chat ─────────────────────────────────────────────────
async function openChat(u){
  active=u;setView('chat');renderUsers();updateHdr();
  $('nc').classList.add('hidden');$('cv').classList.remove('hidden');
  $('ml').innerHTML='';$('mi').placeholder='Message '+u+'...';
  try{
    const r=await fetch('/api/messages/'+u,{headers:{Authorization:'Bearer '+token}});
    const msgs=await r.json();
    msgs.forEach(m=>appendMsg(m,false));scrollBot();
  }catch{}
}
function updateHdr(){
  if(!active)return;
  $('hn').textContent=active;
  $('hav').textContent=ini(active);$('hav').style.background=col(active);
  const on=online.includes(active);
  $('hs').textContent=on?'● Online':'○ Offline';
  $('hs').className='hstat '+(on?'on-s':'off-s');
}
function appendMsg(msg,scroll=true){
  const ml=$('ml'),isMe=msg.from_user===me;
  const d=document.createElement('div');d.className='mr '+(isMe?'me':'');
  d.innerHTML=`${!isMe?`<div class="mav" style="background:${col(msg.from_user)};color:#000">${ini(msg.from_user)}</div>`:''}<div><div class="bub ${isMe?'m':'t'}">${esc(msg.content)}</div><span class="bt">${isMe?'✓✓ ':''}${ts(msg.created_at)}</span></div>`;
  ml.appendChild(d);if(scroll)scrollBot();
}
function scrollBot(){const ml=$('ml');ml.scrollTop=ml.scrollHeight}
function send(){
  const inp=$('mi'),c=inp.value.trim();
  if(!c||!active)return;
  socket.emit('send_message',{to:active,content:c});
  inp.value='';inp.style.height='auto';
  socket.emit('typing',{to:active,isTyping:false});
}
function onKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}}
function onTyping(){
  if(!active)return;
  socket.emit('typing',{to:active,isTyping:true});
  clearTimeout(typTmr);typTmr=setTimeout(()=>socket.emit('typing',{to:active,isTyping:false}),1500);
}
function resize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px'}
function showTyping(on){
  const ml=$('ml');
  if(on&&!typEl){typEl=document.createElement('div');typEl.className='mr';typEl.innerHTML=`<div class="mav" style="background:${col(active)};color:#000">${ini(active)}</div><div class="bub t typdots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;ml.appendChild(typEl);scrollBot();}
  else if(!on&&typEl){typEl.remove();typEl=null;}
}

// ── views ─────────────────────────────────────────────────
function setView(v){
  ['chat','calls'].forEach(x=>{const el=$(x==='chat'?'cv':'callv');if(el)el.classList.toggle('hidden',x!==v)});
  ['chat','calls'].forEach(x=>$('nb-'+x).classList.toggle('on',x===v));
  $('ptitle').textContent=v==='calls'?'Calls':'Chats';
  if(v==='calls')renderCallLog();
}
function renderCallLog(){
  const el=$('cloglist');
  if(!callLog.length){el.innerHTML='<div style="color:var(--muted);font-size:12px;padding:12px">No calls yet.</div>';return}
  el.innerHTML=callLog.slice().reverse().map(c=>`
    <div class="ci" onclick="openChat('${c.with}');startCall('audio')">
      <div class="av" style="background:${col(c.with)}">${ini(c.with)}</div>
      <div class="ci-info"><div class="cn">${c.with}</div><div class="cp" style="color:${c.missed?'var(--red)':'var(--accent)'}">${c.missed?'✗ Missed':'↗ '+c.type}${c.dur?' · '+c.dur:''}</div></div>
      <span style="font-size:10px;color:var(--muted)">${c.when}</span>
    </div>`).join('');
}

// ── calls ─────────────────────────────────────────────────
const ICE={iceServers:[{urls:'stun:stun.l.google.com:19302'}]};

async function startCall(type){
  if(!active)return alert('Select a user first.');
  showCover(active,type,'Calling...');
  try{
    ls=await navigator.mediaDevices.getUserMedia(type==='video'?{audio:true,video:true}:{audio:true,video:false});
    if(type==='video'){const lv=$('lv');lv.srcObject=ls;lv.style.display='block'}
    pc=new RTCPeerConnection(ICE);
    ls.getTracks().forEach(t=>pc.addTrack(t,ls));
    pc.ontrack=e=>{const rv=$('rv');rv.srcObject=e.streams[0];if(type==='video')rv.style.display='block'};
    pc.onicecandidate=e=>{if(e.candidate)socket.emit('ice_candidate',{to:active,candidate:e.candidate})};
    pc.onconnectionstatechange=()=>{if(['connected','completed'].includes(pc.connectionState))startTick()};
    const offer=await pc.createOffer();await pc.setLocalDescription(offer);
    socket.emit('call_user',{to:active,offer,callType:type});
  }catch{setCst('Microphone/camera not available');setTimeout(cleanup,2000)}
}
function showIncoming(from,type){
  $('ico').classList.remove('hidden');
  $('iname').textContent=from;$('iin').textContent=ini(from);
  $('iav').style.background=col(from);
  $('ityp').textContent=(type==='video'?'📹':'📞')+' Incoming '+(type==='video'?'video':'voice')+' call';
}
async function acceptCall(){
  const{from,offer,callType}=incData;
  $('ico').classList.add('hidden');showCover(from,callType,'Connecting...');
  try{
    ls=await navigator.mediaDevices.getUserMedia(callType==='video'?{audio:true,video:true}:{audio:true,video:false});
    if(callType==='video'){const lv=$('lv');lv.srcObject=ls;lv.style.display='block'}
    pc=new RTCPeerConnection(ICE);
    ls.getTracks().forEach(t=>pc.addTrack(t,ls));
    pc.ontrack=e=>{const rv=$('rv');rv.srcObject=e.streams[0];if(callType==='video')rv.style.display='block'};
    pc.onicecandidate=e=>{if(e.candidate)socket.emit('ice_candidate',{to:from,candidate:e.candidate})};
    pc.onconnectionstatechange=()=>{if(['connected','completed'].includes(pc.connectionState))startTick()};
    await pc.setRemoteDescription(offer);
    const answer=await pc.createAnswer();await pc.setLocalDescription(answer);
    socket.emit('call_answer',{to:from,answer});
  }catch{setCst('Microphone/camera not available');setTimeout(cleanup,2000)}
}
function rejectCall(){
  if(incData)socket.emit('call_rejected',{to:incData.from});
  $('ico').classList.add('hidden');incData=null;
}
function showCover(name,type,stat){
  $('cao').classList.remove('hidden');
  $('cdn').textContent=name;$('cin').textContent=ini(name);
  $('cav').style.background=col(name);$('cst').textContent=(type==='video'?'📹 ':'📞 ')+stat;
  $('ctim').classList.add('hidden');$('vbtn').style.display=type==='video'?'flex':'none';
}
function setCst(m){$('cst').textContent=m}
function startTick(){
  setCst('Connected');$('ctim').classList.remove('hidden');callSec=0;
  callTick=setInterval(()=>{callSec++;const m=String(Math.floor(callSec/60)).padStart(2,'0'),s=String(callSec%60).padStart(2,'0');$('ctim').textContent=m+':'+s},1000);
}
function endCall(){
  if(active)socket.emit('end_call',{to:active});
  const dur=callSec>0?$('ctim').textContent:null;
  if(active&&callSec>0){
    callLog.push({with:active,type:'voice',dur,when:ts(new Date().toISOString()),missed:false});
    const s=document.createElement('div');s.className='sys';s.textContent='Call ended · '+dur;$('ml').appendChild(s);scrollBot();
  }
  cleanup();
}
function cleanup(){
  clearInterval(callTick);callSec=0;muted=false;
  if(ls){ls.getTracks().forEach(t=>t.stop());ls=null}
  if(pc){pc.close();pc=null}
  ['cao','ico'].forEach(id=>$(id).classList.add('hidden'));
  ['rv','lv'].forEach(id=>{const v=$(id);v.srcObject=null;v.style.display='none'});
  $('mbtn').classList.remove('mu');$('mbtn').textContent='🎤';incData=null;
}
function toggleMute(){
  muted=!muted;if(ls)ls.getAudioTracks().forEach(t=>t.enabled=!muted);
  $('mbtn').textContent=muted?'🔇':'🎤';$('mbtn').classList.toggle('mu',muted);
}
function toggleVid(){if(ls)ls.getVideoTracks().forEach(t=>t.enabled=!t.enabled)}

// ── init ─────────────────────────────────────────────────
if(token&&me){boot();}
else{
  document.addEventListener('keydown',e=>{if(e.key!=='Enter')return;$('rf').classList.contains('hidden')?doLogin():doRegister()});
}
</script>
